# ──────────────────────────────────────────────────────────────────────────────
#  Franja Pixelada — Nginx PRODUCCIÓN
#  HTTPS obligatorio + HSTS + TLS 1.2/1.3
#  Reemplaza nginx.conf en producción via docker-compose.prod.yml
# ──────────────────────────────────────────────────────────────────────────────

upstream django_backend {
    server backend:8000;
    keepalive 32;
}

# ── Límites de tasa ───────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=60r/m;

# ── HTTP → redirige siempre a HTTPS ──────────────────────────────────────────
server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # ACME challenge para Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name tudominio.com www.tudominio.com;

    # Certificados Let's Encrypt (Certbot los genera automáticamente)
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

    # Solo TLS moderno
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # Caché de sesión SSL
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS — fuerza HTTPS durante 1 año en todos los subdominios
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size  10M;
    client_body_timeout   30s;
    client_header_timeout 10s;

    # ── Archivos estáticos ────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos media (uploads) ──────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    # ── Login admin — rate limiting estricto (5/min en prod) ─────────────────
    location ~* ^/[^/]+/login/ {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Todo lo demás → Django ────────────────────────────────────────────────
    location / {
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
