# ──────────────────────────────────────────────────────────────────────────────
#  Franja Pixelada — Nginx PRODUCCIÓN
#  HTTPS obligatorio + HSTS + TLS 1.2/1.3
#  Reemplaza nginx.conf en producción via docker-compose.prod.yml
# ──────────────────────────────────────────────────────────────────────────────

upstream django_backend {
    server backend:8000;
    keepalive 32;
}

# ── Señales de tráfico malicioso (WAF ligero en borde) ───────────────────────
map $http_user_agent $is_bad_ua {
    default 0;
    ~*(sqlmap|nikto|acunetix|nmap|masscan|dirbuster|wpscan) 1;
}

map $query_string $is_bad_query {
    default 0;
    ~*(\.\./|<script|%3Cscript|union(\+|%20)select|select(\+|%20).+from|sleep\(|benchmark\(|or(\+|%20)1=1) 1;
}

# ── Límites de tasa ───────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

# Logs enriquecidos para SIEM/WAF correlation (debe ir en contexto http/server global)
log_format security_json escape=json
  '{"ts":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id",'
  '"host":"$host","method":"$request_method","uri":"$request_uri","status":$status,'
  '"body_bytes_sent":$body_bytes_sent,"referer":"$http_referer","ua":"$http_user_agent",'
  '"xff":"$http_x_forwarded_for","request_time":$request_time}';

# ── HTTP → redirige siempre a HTTPS ──────────────────────────────────────────
server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # ACME challenge para Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name tudominio.com www.tudominio.com;

    # Certificados Let's Encrypt (Certbot los genera automáticamente)
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

    # Solo TLS moderno
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # Caché de sesión SSL
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS — fuerza HTTPS durante 1 año en todos los subdominios
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size  10M;
    client_body_timeout   30s;
    client_header_timeout 10s;
    limit_conn conn_zone 40;

    access_log /var/log/nginx/access.log security_json;
    error_log  /var/log/nginx/error.log warn;

    # Bloqueos rápidos de borde (WAF baseline)
    if ($is_bad_ua) { return 403; }
    if ($is_bad_query) { return 403; }
    if ($request_method ~* "(TRACE|TRACK|CONNECT)") { return 405; }

    # ── Archivos estáticos ────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media sensible: solo Django (URLs firmadas o sesión staff) ────────────
    location ~* ^/media/(protected/|payment_proofs/|profile_images/) {
        deny all;
        return 404;
    }

    # ── Archivos media (uploads públicos restantes) ───────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    # Bloquear archivos sensibles por defecto
    location ~ /\.(env|git|svn|ht|DS_Store) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Login admin — rate limiting estricto (5/min en prod) ─────────────────
    location ~* ^/[^/]+/login/ {
        limit_req zone=login_zone burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Todo lo demás → Django ────────────────────────────────────────────────
    location / {
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
