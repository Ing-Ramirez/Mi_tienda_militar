# ──────────────────────────────────────────────────────────────────────────────
#  Franja Pixelada / Franja Pixelada — Nginx Configuration
#  Proxy inverso: Django en backend:8000
#  HTTP en desarrollo | HTTPS en producción (descomentar bloque SSL)
# ──────────────────────────────────────────────────────────────────────────────

# Resolver de Docker para re-resolución dinámica de hostnames
resolver 127.0.0.11 valid=10s ipv6=off;

upstream django_backend {
    server backend:8000;
    keepalive 32;
}

# ── Límites de tasa para endpoints críticos ──────────────────────────────────
# Brute force en login: máx 10 req/min por IP
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
# API general: máx 60 req/min por IP
limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=60r/m;

# ── Servidor HTTP ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ACME challenge para renovación automática de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── EN PRODUCCIÓN: descomentar estas 2 líneas y comentar los bloques abajo ──
    # return 301 https://$host$request_uri;

    # ── Límites generales ────────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 10s;

    # ── Archivos estáticos (collectstatic) ───────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos multimedia (uploads) ────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    # ── Login del admin — rate limiting estricto ─────────────────────────────
    location ~* ^/[^/]+/login/ {
        limit_req zone=login_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API — rate limiting moderado ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Todo lo demás → Django ────────────────────────────────────────────────
    location / {
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

