# ──────────────────────────────────────────────────────────────────────────────
#  Franja Pixelada / Franja Pixelada — Nginx Configuration
#  Proxy inverso: Django en backend:8000
#  HTTP en desarrollo | HTTPS en producción (descomentar bloque SSL)
# ──────────────────────────────────────────────────────────────────────────────

# Resolver de Docker para re-resolución dinámica de hostnames
resolver 127.0.0.11 valid=10s ipv6=off;

upstream django_backend {
    server backend:8000;
    keepalive 32;
}

# ── Señales de tráfico malicioso (WAF ligero en borde) ───────────────────────
map $http_user_agent $is_bad_ua {
    default 0;
    ~*(sqlmap|nikto|acunetix|nmap|masscan|dirbuster|wpscan) 1;
}

map $query_string $is_bad_query {
    default 0;
    ~*(\.\./|<script|%3Cscript|union(\+|%20)select|select(\+|%20).+from|sleep\(|benchmark\(|or(\+|%20)1=1) 1;
}

# ── Límites de tasa para endpoints críticos ──────────────────────────────────
# Brute force en login: máx 10 req/min por IP
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
# API general: máx 60 req/min por IP
limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

# Logs enriquecidos para SIEM/WAF correlation (debe ir en contexto http/server global)
log_format security_json escape=json
  '{"ts":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id",'
  '"host":"$host","method":"$request_method","uri":"$request_uri","status":$status,'
  '"body_bytes_sent":$body_bytes_sent,"referer":"$http_referer","ua":"$http_user_agent",'
  '"xff":"$http_x_forwarded_for","request_time":$request_time}';

# ── Servidor HTTP ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ACME challenge para renovación automática de certificados Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── EN PRODUCCIÓN: descomentar estas 2 líneas y comentar los bloques abajo ──
    # return 301 https://$host$request_uri;

    # ── Límites generales ────────────────────────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout  30s;
    client_header_timeout 10s;
    limit_conn conn_zone 40;

    access_log /var/log/nginx/access.log security_json;
    error_log  /var/log/nginx/error.log warn;

    # Bloqueos rápidos de borde (WAF baseline)
    if ($is_bad_ua) { return 403; }
    if ($is_bad_query) { return 403; }
    if ($request_method ~* "(TRACE|TRACK|CONNECT)") { return 405; }

    # ── Archivos estáticos (solo DESARROLLO) ─────────────────────────────────
    # Delegar /static/ a Django+WhiteNoise: los CSS/JS en backend/static/ se reflejan
    # al guardar sin rebuild ni collectstatic. El volumen staticfiles puede quedar vacío.
    # PRODUCCIÓN (nginx.prod.conf): alias /app/staticfiles + Cache-Control immutable.
    location /static/ {
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ── Media sensible (comprobantes, avatares): no exponer por URL directa ──
    location ~* ^/media/(protected/|payment_proofs/|profile_images/) {
        deny all;
        return 404;
    }

    # ── Archivos multimedia (uploads públicos restantes) ─────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    # Bloquear archivos sensibles por defecto
    location ~ /\.(env|git|svn|ht|DS_Store) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Login del admin — rate limiting estricto ─────────────────────────────
    location ~* ^/[^/]+/login/ {
        limit_req zone=login_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── API — rate limiting moderado ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Página de mantenimiento (backend reiniciando) ────────────────────────
    error_page 502 503 504 /mantenimiento.html;
    location = /mantenimiento.html {
        root /etc/nginx/pages;
        internal;
        add_header Retry-After 30;
        add_header Cache-Control "no-store";
    }

    # ── Todo lo demás → Django ────────────────────────────────────────────────
    location / {
        proxy_pass http://django_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}

