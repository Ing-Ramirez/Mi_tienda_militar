# ──────────────────────────────────────────────────────────────────────────────
#  Franja Pixelada — Docker Compose
#  Stack completo: Nginx · Django · PostgreSQL · Redis · Certbot
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: franja_pixelada_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-franja_pixelada_store}
      POSTGRES_USER:     ${DB_USER:-franja_pixelada_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-franja_pixelada_user} -d ${DB_NAME:-franja_pixelada_store}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Redis (caché y sesiones) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: franja_pixelada_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD es obligatorio}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: franja_pixelada_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()",
        ]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 120s
    env_file:
      - .env.dev   # cambiar a .env.prod antes de desplegar en servidor
    # Puerto 8000 NO expuesto al host — accesible solo desde Nginx via app_net
    expose:
      - "8000"
    volumes:
      - ./backend:/app          # desarrollo: cambios en código se reflejan sin rebuild
      - media_files:/app/media
      - static_files:/app/staticfiles
      - ./logs:/app/logs
    networks:
      - app_net
      - db_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: sh /app/entrypoint.sh
    security_opt:
      - no-new-privileges:true

  # ── Celery Worker (procesamiento asíncrono de tareas) ──────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: franja_pixelada_celery
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    networks:
      - app_net
      - db_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python -m celery -A franja_pixelada worker --loglevel=info --concurrency=2 -Q celery
    security_opt:
      - no-new-privileges:true

  # ── Celery Beat (tareas periódicas — polling de proveedores) ────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: franja_pixelada_celery_beat
    restart: unless-stopped
    depends_on:
      - celery_worker
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    networks:
      - app_net
      - db_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: python -m celery -A franja_pixelada beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    security_opt:
      - no-new-privileges:true

  # ── Nginx (proxy inverso + archivos estáticos) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: franja_pixelada_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/conf.d/proxy_params.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - ./logs/nginx:/var/log/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - app_net
    security_opt:
      - no-new-privileges:true

  # ── Certbot (renovación automática de certificados TLS) ─────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: franja_pixelada_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

# ── Volúmenes persistentes ──────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  certbot_www:
  certbot_certs:

# ── Redes segmentadas (aislamiento por capa) ────────────────────────────────
networks:
  app_net:
    # Nginx <-> Backend <-> Redis
    driver: bridge

  db_net:
    # Backend <-> PostgreSQL unicamente — DB aislada de Nginx y Redis
    driver: bridge
    internal: true
