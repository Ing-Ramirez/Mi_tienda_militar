{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Franja Pixelada{% endblock %}

{% block extrastyle %}
{# Prevenir FOUC: aplica tema antes del primer render del navegador #}
<script nonce="{{ csp_nonce }}">!function(){var t=localStorage.getItem('fp_theme');if(t!=='light')document.documentElement.classList.add('fp-dark');}();</script>
{{ block.super }}
{% endblock %}

{% block footer %}{{ block.super }}
<div id="fp-loader"><div id="fp-loader-bar"></div></div>
<script nonce="{{ csp_nonce }}">
(function () {
  'use strict';

  /* ── Constantes SPA ───────────────────────────────────────── */
  var ADMIN_BASE = (function () {
    var m = location.pathname.match(/^(\/[^/]+\/)/);
    return m ? m[1] : '/admin/';
  })();
  var FULL_RELOAD = [
    /\/add\/?$/, /\/change\/?$/, /\/delete\/?$/, /\/password_change\//,
    /\/export\//, /\/import\//
  ];
  var SB_SCROLL_KEY = 'fp_sb_scroll';
  var THEME_KEY     = 'fp_theme';
  var loading       = false;
  var themeTimer    = null;

  /* ── Dark / Light mode ────────────────────────────────────── */
  function getTheme() {
    return document.documentElement.classList.contains('fp-dark') ? 'dark' : 'light';
  }
  function updateThemeBtn(theme) {
    var btn = document.getElementById('fp-theme-btn');
    if (!btn) return;
    btn.textContent = theme === 'dark' ? '\u2600\uFE0F Claro' : '\uD83C\uDF19 Oscuro';
    btn.title       = theme === 'dark' ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro';
  }
  function applyTheme(theme, animate) {
    if (themeTimer) { clearTimeout(themeTimer); themeTimer = null; }
    var html = document.documentElement;
    if (animate) {
      html.classList.add('fp-transitioning');
      html.offsetHeight; /* fuerza reflow para activar transitions antes del cambio */
      themeTimer = setTimeout(function () { html.classList.remove('fp-transitioning'); }, 320);
    }
    if (theme === 'dark') { html.classList.add('fp-dark'); }
    else                  { html.classList.remove('fp-dark'); }
    updateThemeBtn(theme);
  }
  function insertThemeBtn() {
    if (document.getElementById('fp-theme-btn')) return;
    var nav = document.querySelector('.main-header .navbar-nav.ml-auto');
    if (!nav) return;
    var li  = document.createElement('li');
    li.className = 'nav-item fp-theme-nav';
    var btn = document.createElement('button');
    btn.id   = 'fp-theme-btn';
    btn.type = 'button';
    btn.addEventListener('click', function () {
      var next = getTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next, true);
    });
    li.appendChild(btn);
    nav.insertBefore(li, nav.firstChild);
    updateThemeBtn(getTheme());
  }

  /* ── Loader ───────────────────────────────────────────────── */
  var loader = document.getElementById('fp-loader');
  function showLoader() { if (loader) loader.classList.add('active'); }
  function hideLoader() { if (loader) loader.classList.remove('active'); }

  /* ── Sidebar fijo ─────────────────────────────────────────── */
  function fixSidebar() {
    document.body.classList.remove('sidebar-collapse');
    var toggle = document.querySelector('[data-widget="pushmenu"]');
    if (toggle) toggle.setAttribute('data-no-spa', '1');
  }

  /* ── Persistencia del scroll del sidebar ──────────────────── */
  function saveSbScroll() {
    var sb = document.querySelector('.main-sidebar .sidebar, .main-sidebar');
    if (sb) sessionStorage.setItem(SB_SCROLL_KEY, sb.scrollTop);
  }
  function restoreSbScroll() {
    var sb = document.querySelector('.main-sidebar .sidebar, .main-sidebar');
    var saved = parseInt(sessionStorage.getItem(SB_SCROLL_KEY) || '0', 10);
    if (sb && saved) sb.scrollTop = saved;
  }

  /* ── Ítem activo ──────────────────────────────────────────── */
  function markActive(pathname) {
    pathname = pathname || location.pathname;
    document.querySelectorAll('.nav-sidebar .nav-link').forEach(function (a) {
      var href = a.getAttribute('href') || '';
      var isActive = href && (href === pathname || (pathname.startsWith(href) && href !== ADMIN_BASE));
      a.classList.toggle('active', isActive);
      if (isActive) {
        var parent = a.closest('.nav-item.has-treeview');
        if (parent) parent.classList.add('menu-open');
      }
    });
  }

  /* ── Auto-scroll al ítem activo (solo uso explícito / debug) ─
   * NO se llama automáticamente: el sidebar nunca modifica su
   * posición por navegación — el usuario mantiene el contexto.
   * Disponible en consola: FpSPA.scrollToActive()
   * ─────────────────────────────────────────────────────────── */
  function scrollToActive() {
    var active = document.querySelector('.nav-sidebar .nav-link.active');
    if (!active) return;
    var sb = document.querySelector('.main-sidebar .sidebar, .main-sidebar');
    if (!sb) return;
    var sbRect = sb.getBoundingClientRect();
    var aRect  = active.getBoundingClientRect();
    sb.scrollTop = Math.max(0, aRect.top - sbRect.top + sb.scrollTop - (sb.clientHeight / 2) + (active.offsetHeight / 2));
  }

  /* ── ¿URL requiere recarga completa? ─────────────────────── */
  function needsFullReload(url) {
    try {
      var p = new URL(url, location.origin);
      if (FULL_RELOAD.some(function (re) { return re.test(p.pathname); })) return true;
      if (p.searchParams.has('_export') || p.searchParams.has('format')) return true;
    } catch (e) {}
    return false;
  }

  /* ── Reinit básico de Django admin tras carga dinámica ────── *
   * Otros scripts pueden escuchar el evento 'djfp:loaded' en
   * django.jQuery(document) para ejecutar lógica post-SPA:
   *   django.jQuery(document).on('djfp:loaded', function() { ... });
   * ─────────────────────────────────────────────────────────── */
  function reinitAdmin() {
    var cw = document.querySelector('.content-wrapper');
    if (!cw) return;
    cw.querySelectorAll('script').forEach(function (old) {
      if (old.src) return;
      var s = document.createElement('script');
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
    try {
      if (typeof django !== 'undefined' && django.jQuery) {
        django.jQuery(document).trigger('djfp:loaded');
        if (typeof DateTimeShortcuts !== 'undefined') {
          django.jQuery('.datetimeshortcuts').remove();
          DateTimeShortcuts.init();
        }
      }
    } catch (e) {}
    try {
      if (typeof window.$ !== 'undefined') {
        $('[data-toggle="tooltip"]').tooltip();
        $('[data-toggle="popover"]').popover();
      }
    } catch (e) {}
  }

  /* ── Reemplazar zona de contenido ────────────────────────── */
  function replaceContent(doc) {
    document.title = doc.title;
    var newCW  = doc.querySelector('.content-wrapper');
    var currCW = document.querySelector('.content-wrapper');
    if (!newCW || !currCW) return false;
    currCW.innerHTML = newCW.innerHTML;
    currCW.classList.add('fp-content-fade');
    currCW.addEventListener('animationend', function onEnd() {
      currCW.classList.remove('fp-content-fade');
      currCW.removeEventListener('animationend', onEnd);
    });
    currCW.scrollTop = 0;
    window.scrollTo(0, 0);
    return true;
  }

  /* ── Navegación SPA ───────────────────────────────────────── */
  function navigate(url, push) {
    if (loading) return;
    if (needsFullReload(url)) { location.href = url; return; }
    var parsed     = new URL(url, location.origin);
    var controller = new AbortController();
    var abortTimer = setTimeout(function () { controller.abort(); }, 15000);
    loading = true;
    saveSbScroll();
    showLoader();

    fetch(url, {
      signal: controller.signal,
      headers: { 'X-Requested-With': 'FpSPA' },
      credentials: 'same-origin'
    })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        if (!res.url.includes(ADMIN_BASE)) { location.href = res.url; throw null; }
        return res.text();
      })
      .then(function (html) {
        var doc = new DOMParser().parseFromString(html, 'text/html');
        if (!replaceContent(doc)) { location.href = url; return; }
        if (push !== false) history.pushState({ spa: true, url: url }, doc.title, url);
        markActive(parsed.pathname);
        restoreSbScroll();
        reinitAdmin();
      })
      .catch(function (err) {
        if (err) {
          var msg = err.name === 'AbortError' ? 'timeout (15s)' : err.message;
          console.warn('[FpSPA] fallback \u2192', msg);
          location.href = url;
        }
      })
      .finally(function () { clearTimeout(abortTimer); loading = false; hideLoader(); });
  }

  /* ── Interceptor de clics ─────────────────────────────────── */
  document.addEventListener('click', function (e) {
    var a = e.target.closest('a[href]');
    if (!a || e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) return;
    var href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('javascript') || href.startsWith('mailto')) return;
    if (a.target === '_blank' || a.dataset.noSpa) return;
    var url;
    try { url = new URL(href, location.origin); } catch (x) { return; }
    if (url.origin !== location.origin) return;
    if (!url.pathname.startsWith(ADMIN_BASE)) return;
    if (a.className && /related-widget-wrapper-link|viewsite/.test(a.className)) return;
    /* Para excluir un link específico del SPA, añadir: data-no-spa="1" */
    e.preventDefault();
    navigate(url.href);
  }, true);

  /* ── Botón atrás / adelante ───────────────────────────────── */
  window.addEventListener('popstate', function () { navigate(location.href, false); });

  /* ── Init ─────────────────────────────────────────────────── */
  function init() {
    fixSidebar();
    markActive();
    restoreSbScroll();
    insertThemeBtn();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  /* Exponer para depuración */
  window.FpSPA = {
    navigate: navigate,
    markActive: markActive,
    scrollToActive: scrollToActive,
    toggleTheme: function () {
      var next = getTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next, true);
    }
  };
})();
</script>
{% endblock %}
